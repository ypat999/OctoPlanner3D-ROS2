/**:
  ros__parameters:
    # 输入 PCD 点云文件路径
    # 路径说明：通过global_config或launch参数指定，此处为默认值
    # 实际运行时由 global_config.global_config.OCTOPLANNER_PCD_FILE_PATH 或 launch params_file 参数决定
    input_pcd: "/home/ztl/slam_data/3d_map/3dmap.pcd"  # 默认路径，可被global_config覆盖

    # 输出 .bt 八叉树文件（不填则自动与 PCD 同名，e.g. 3dmap.pcd → 3dmap.bt）
    # output_bt: "result_cleaned.bt"

    # OctoMap 构建参数
    resolution: 0.2            # 体素分辨率（米），建议与 PCD 降采样分辨率一致
    min_points_per_voxel: 1    # 每个体素至少需要的点数，已降采样的点云建议设为 1
    min_cluster_voxels: 2      # 最小连通聚类体素数，已降采样的点云建议设为 1

    openmp_num_threads: 0      # OpenMP 并行线程数（0 = 自动，1 = 禁止并行，4 = 4 线程）

    # RViz2 中使用的坐标框架
    frame_id: "map"

    # 体素地图可视化参数
    map_alpha: 0.82           # 体素透明度 (0.05 ~ 1.0)
    map_color_mode: "height"  # 颜色模式: "height" 按高度着色
    # 规划起点 / 终点默认 Z 值（当用户未指定 z 时回退）
    start_z: 0.3
    goal_z: 0.3

    # RViz2 Publish Point 工具的话题名
    clicked_point_topic: "clicked_point"

    # ===== nav2 集成参数 =====
    # 双模式架构：导航模式和测试模式独立运行
    # - 导航模式：initialpose + goal_pose（Nav2执行，绿色路径）
    # - 测试模式：clicked_point连续点击（仅供可视化，蓝色路径）
    # - goal_pose到达时，若无起点自动从TF获取机器人位置

    # 机器人基座坐标系（用于 TF 查询获取当前位置）
    robot_base_frame: "base_footprint"

    # TF 查询超时时间（秒）
    transform_timeout: 0.5

    # 路径朝向计算模式
    # "from_goal": 最后一个点的朝向使用 goal_pose 的朝向
    # "interpolate": 所有点朝向根据路径方向插值计算
    path_orientation_mode: "interpolate"

    # 导航路径发布话题名（Nav2 默认监听 /plan）
    planned_path_topic: "plan"

    # ===== 规划参数（与机器人尺寸和导航行为相关）=====
    # 机器人半径（米），影响障碍物避让和宽度约束
    # 典型值：小型 0.20（宽0.4米），中型 0.30（宽0.6米），大型 0.50（宽1.0米）
    robot_radius: 0.2

    # A* 最大迭代次数，复杂地图可增加此值
    max_iterations: 800000

    # 起点/终点吸附搜索半径（栅格数），用于找到最近的可行点
    # 增加此值可在更大的范围内搜索平坦区域作为起点/终点，减少从路沿/草丛开始
    # 注意：修改此参数不会触发缓存重新计算，需手动删除 .bt_planning_cache 或接受当前缓存
    snap_search_radius_cells: 2

    # ===== 地面支撑参数（跨楼层/跨楼梯能力）=====
    # 是否要求地面支撑（关闭可支持飞行模式）
    require_ground_support: true

    # 是否严格正下方支撑（关闭允许斜坡/边缘支撑）
    # 开启此选项可减少跨越草丛和路沿的行为，要求路径点正下方必须有支撑
    # 注意：分辨率降低时（如0.25），严格模式只查下方1格（0.25m），容易失效
    # 如果频繁规划失败，建议关闭此选项并增大 ground_support_depth_cells
    strict_direct_ground_support: false

    # 地面支撑XY半径（栅格数），增加可支持斜坡
    # 减小此值可减少跨越小障碍物（如路沿、小草丛），保持更大的平坦区域
    ground_support_xy_radius_cells: 2

    # 地面支撑深度（栅格数），增加可支持跨楼梯
    # 减小此值可减少跨越台阶和楼梯，适合走平路场景
    # 分辨率 0.25 时建议 ≥ 3（对应 0.75m 物理深度）
    ground_support_depth_cells: 3

    # ===== 障碍物避让参数（高度约束）=====
    # 启用预阻塞代价图（根据 robot_radius 和预阻塞半径计算可通行性）
    enable_preblocked_costmap: true

    # 预阻塞代价场扩散半径（栅格数），决定障碍物周围 traversable cells 受到的排斥代价范围
    # 此值定义了从障碍物边缘开始代价场影响的最大距离（栅格数）
    # 增大此值可让路径更远离障碍物，但也会增加规划计算量
    # 典型值：2~25；建议与 robot_radius/resolution 相当或更大
    preblocked_costmap_radius_cells: 2

    # 预阻塞代价权重，增加此值会让路径更远离障碍物
    # 增加此值可减少靠近草丛和路沿的行为，路径会保持在更平坦的区域
    preblocked_costmap_weight: 8.0

    # 代价衰减因子（Nav2 风格）：控制从 inscribed_radius 到 inflation_radius 的衰减速度
    # cost = exp(-factor * normalized_distance)，factor 越大衰减越快，窄通道 cost 叠加更平缓
    # Nav2 典型值：3.0~10.0；值越大，cost 场更集中在障碍物附近，远离障碍处快速降到 0
    cost_scaling_factor: 10.0

    # 只使用最低可通行层：开启后在每个 (x,y) 列只保留最低的 traversable 格子
    # true = 禁止爬楼梯/上平台，路径保持在地面层
    # false = 允许使用高层可通行格子，支持跨楼层导航
    lowest_traversable_only: false

    # ===== A* 方向一致性参数 =====
    # 方向变化惩罚权重：A* 扩展时进出方向夹角越大，惩罚越重
    # 0 = 禁用；增大此值可减少路径中的之字形转弯，让路径更顺滑
    # 典型值：1.5~3.0；过大会导致路径绕远
    dir_change_weight: 2.0
    # 对角线跨越惩罚：xy 平面对角移动时，若中间轴对齐格子在目标 z 层不可通行，
    # 说明对角格子是噪声"桥梁"（同高但正前/左右低一格），应加罚避免折角路径
    # 0 = 禁用；值越大越严格地阻止噪声桥接对角移动；典型值 3.0~10.0
    diagonal_bridge_weight: 5.0

    # ===== 路径平滑参数 =====
    # 流程：简化(碰撞感知) -> 约束式梯度平滑(稀疏点) -> 碰撞感知插值
    # 全程基于“线段碰撞检查”(3D DDA)，穿障时回退而非吸附，避免高频震荡与穿障
    # 是否启用路径平滑
    smoothing_enabled: true
    # 路径简化容忍度（米），仅当跳过点后的弦仍可通行时才跳过，避免切角穿障
    smoothing_simplify_epsilon: 0.15
    # 插值点间距（米），Catmull-Rom 曲线若离开安全走廊则该段回退为线性插值
    smoothing_interp_spacing: 0.15
    # 梯度下降迭代次数（作用于稀疏折角点），越大越平
    smoothing_gradient_iterations: 200
    # 梯度下降步长（带迭代衰减与半栅格位移上限），收敛越快越稳
    smoothing_gradient_alpha: 0.3
    # cost 场梯度排斥步长，−∇cost 推开路径远离障碍（迭代中替代碰撞检查）
    # buildTraversableGrid 已将非可通行格 cost 置为 1.0，故梯度始终指向远离障碍方向
    smoothing_cost_gradient_beta: 0.2
    # 代价门控容差，允许沿等代价线微调以便拐角圆化，但禁止明显向障碍靠近
    # 越大路径越贴墙，越小越保守远离障碍
    smoothing_cost_tolerance: 0.1
    # 单步位移上限（米），防止梯度下降时拐角处大幅跳跃；0=auto=半栅格(res*0.5)
    smoothing_max_step: 0.0
    # z 方向台阶平滑窗口半径，消除栅格离散化导致的楼梯状路径
    # 沿路径做加权滑动平均，越大越平滑但也越接近斜坡附近的 free space 边界
    smoothing_z_window_radius: 2
